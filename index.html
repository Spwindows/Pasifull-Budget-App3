<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BudgetFlow Shared</title>

<style>
body{margin:0;font-family:Arial;background:#020617;color:#fff}
.app{max-width:600px;margin:auto;padding:15px}

.card{
  background:#111827;
  border-radius:20px;
  padding:15px;
  margin-bottom:12px;
}

.big{font-size:36px;font-weight:bold}
.value{font-size:20px}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}

button{
  padding:12px;
  border:none;
  border-radius:12px;
  font-weight:bold;
  width:100%;
}

.green{background:#22c55e}
.orange{background:#f59e0b}
.blue{background:#38bdf8}
</style>
</head>

<body>

<div class="app">

<div class="card">
<h2>BudgetFlow Shared</h2>
<p id="syncStatus">Connecting...</p>
</div>

<div class="card">
<div>Available</div>
<div id="available" class="big">$0</div>

<div class="grid">
<div>Spent: <span id="spent">$0</span></div>
<div>Bills: <span id="bills">$0</span></div>
</div>
</div>

<div class="card">
<input id="income" placeholder="Income"><br><br>
<input id="billsInput" placeholder="Bills"><br><br>
<input id="spendInput" placeholder="Add Spend"><br><br>

<button class="blue" onclick="addSpend()">Add Spend</button>
<button class="green" onclick="save()">Save</button>
<button class="orange" onclick="reset()">Reset</button>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>

const SUPABASE_URL = "https://smtgoefvimzevawzpodn.supabase.co";
const SUPABASE_KEY = "sb_publishable_U07TGXYwm82AnjJQ2CuPog_2CDn9iqO";
const TABLE = "shared_budgets";

const urlParams = new URLSearchParams(window.location.search);
const budgetId = urlParams.get("budget") || "sean-budget";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let state = {
  income:0,
  bills:0,
  spent:0
};

function calc(){
  const total = state.income - state.bills - state.spent;
  document.getElementById("available").innerText = "$" + total.toFixed(2);
  document.getElementById("spent").innerText = "$" + state.spent;
  document.getElementById("bills").innerText = "$" + state.bills;
}

function addSpend(){
  const val = parseFloat(document.getElementById("spendInput").value) || 0;
  state.spent += val;
  document.getElementById("spendInput").value = "";
  save();
}

function save(){
  state.income = parseFloat(document.getElementById("income").value) || state.income;
  state.bills = parseFloat(document.getElementById("billsInput").value) || state.bills;

  calc();

  supabase.from(TABLE).upsert({
    id: budgetId,
    payload: state
  });

  document.getElementById("syncStatus").innerText = "Saved (syncing)";
}

function reset(){
  state = {income:0,bills:0,spent:0};
  save();
}

async function load(){
  const res = await supabase.from(TABLE).select("*").eq("id", budgetId).single();

  if(res.data){
    state = res.data.payload;
    document.getElementById("income").value = state.income;
    document.getElementById("billsInput").value = state.bills;
    calc();
    document.getElementById("syncStatus").innerText = "Connected";
  } else {
    document.getElementById("syncStatus").innerText = "New shared budget created";
  }
}

setInterval(load, 3000);

load();

</script>

</body>
</html>
