<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BudgetFlow</title>
<link rel="manifest" href="manifest.json">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#020617;
  color:#fff;
}
.container{padding:20px;max-width:500px;margin:auto}
.card{background:#111827;padding:15px;border-radius:12px;margin-bottom:10px}
button{padding:12px;border:none;border-radius:10px;margin-top:10px;width:100%}
.primary{background:#38bdf8}
.success{background:#22c55e}
.warn{background:#f59e0b}
.hidden{display:none}
</style>
</head>

<body>

<div class="container">

<h1>BudgetFlow</h1>

<div id="setupBox" class="card hidden">
  <h3>Choose Mode</h3>
  <button id="soloBtn" class="primary">Solo Free</button>
  <button id="couplesBtn" class="success">Couples (7 day trial)</button>
</div>

<div id="upgradeBox" class="card hidden">
  <h3>Upgrade Required</h3>
  <p>Trial ended</p>
  <button id="upgradeBtn" class="warn">Unlock Couples ($9.99/year)</button>
</div>

<div class="card">
  <h3 id="modeText">Loading...</h3>
</div>

<div class="card">
  <input id="income" placeholder="Income">
  <input id="bills" placeholder="Bills">
  <input id="spent" placeholder="Spent">

  <button id="calcBtn" class="primary">Calculate</button>

  <h2 id="result">$0</h2>
</div>

</div>

<script>

const TRIAL_DAYS = 7;

function getMode(){return localStorage.getItem("mode")}
function setMode(m){localStorage.setItem("mode",m)}

function getTrialStart(){
  let t = localStorage.getItem("trialStart");
  if(!t){
    t = Date.now();
    localStorage.setItem("trialStart",t);
  }
  return Number(t);
}

function trialDaysUsed(){
  return Math.floor((Date.now()-getTrialStart())/86400000);
}

function trialActive(){
  return trialDaysUsed() < TRIAL_DAYS;
}

function isPremium(){
  return localStorage.getItem("premium")==="true";
}

function setPremium(v){
  localStorage.setItem("premium",v?"true":"false");
}

function updateUI(){
  const mode = getMode();

  if(!mode){
    document.getElementById("setupBox").classList.remove("hidden");
    return;
  }

  document.getElementById("setupBox").classList.add("hidden");

  if(mode==="solo"){
    document.getElementById("modeText").innerText="Solo Free Mode";
    return;
  }

  if(mode==="couples"){
    if(isPremium()){
      document.getElementById("modeText").innerText="Couples Premium";
      return;
    }

    if(trialActive()){
      document.getElementById("modeText").innerText=
        "Couples Trial ("+(TRIAL_DAYS-trialDaysUsed())+" days left)";
      return;
    }

    document.getElementById("modeText").innerText="Trial Ended";
    document.getElementById("upgradeBox").classList.remove("hidden");
  }
}

document.getElementById("soloBtn").onclick=()=>{
  setMode("solo");
  updateUI();
}

document.getElementById("couplesBtn").onclick=()=>{
  setMode("couples");
  getTrialStart();
  updateUI();
}

document.getElementById("upgradeBtn").onclick=()=>{
  setPremium(true);
  document.getElementById("upgradeBox").classList.add("hidden");
  updateUI();
}

document.getElementById("calcBtn").onclick=()=>{
  let income = parseFloat(document.getElementById("income").value)||0;
  let bills = parseFloat(document.getElementById("bills").value)||0;
  let spent = parseFloat(document.getElementById("spent").value)||0;

  let result = income - bills - spent;

  document.getElementById("result").innerText="$"+result.toFixed(2);
}

updateUI();

</script>

</body>
</html>
