<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BudgetFlow</title>
<link rel="manifest" href="manifest.json">

<style>
body{margin:0;font-family:Arial;background:#0f172a;color:#fff}
.app{max-width:500px;margin:auto;padding:15px}
.card{background:#111827;padding:15px;border-radius:15px;margin-bottom:12px}
input,button{width:100%;padding:12px;border-radius:10px;border:none;margin-top:8px}
button{background:#38bdf8;color:#fff;font-weight:bold}
.small{color:#94a3b8;font-size:13px}
.hidden{display:none}
</style>
</head>

<body>
<div class="app">

<h2>💸 BudgetFlow</h2>
<div id="status"></div>

<div class="card">
<h3>Available</h3>
<div id="available">$0</div>
</div>

<div class="card">
<input id="income" placeholder="Weekly Income">
<input id="bills" placeholder="Weekly Bills">
<input id="spend" placeholder="Add Spend">
<button onclick="addSpend()">Add Spend</button>
</div>

<div class="card">
<h3>Spends</h3>
<div id="spendList"></div>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
// 🔑 YOUR SUPABASE
const SUPABASE_URL = "https://smtgoefvimzevawzpodn.supabase.co";
const SUPABASE_KEY = "sb_publishable_U07TGXYwm82AnjJQ2CuPog_2CDn9iqO";
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// 🔗 UNIQUE BUDGET ID
let params = new URLSearchParams(location.search);
let budgetId = params.get("budget");

if(!budgetId){
  budgetId = localStorage.getItem("budgetId");
  if(!budgetId){
    budgetId = "bf-" + Math.random().toString(36).substring(2,8);
    localStorage.setItem("budgetId", budgetId);
  }
}

// STATE
let state = {
  income:0,
  bills:0,
  spends:[]
};

// LOAD FROM DB
async function load(){
  let {data} = await db.from("shared_budgets").select("*").eq("id", budgetId).single();
  if(data){
    state = data.payload;
    render();
  }
}

// SAVE TO DB
async function save(){
  await db.from("shared_budgets").upsert({
    id:budgetId,
    payload:state
  });
}

// ADD SPEND
function addSpend(){
  let val = document.getElementById("spend").value;
  if(!val) return;
  state.spends.push(Number(val));
  document.getElementById("spend").value="";
  save();
  render();
}

// RENDER UI
function render(){
  document.getElementById("income").value = state.income;
  document.getElementById("bills").value = state.bills;

  let totalSpent = state.spends.reduce((a,b)=>a+b,0);
  let available = state.income - state.bills - totalSpent;

  document.getElementById("available").innerText = "$"+available;

  let list="";
  state.spends.forEach(s=> list += "<div>$"+s+"</div>");
  document.getElementById("spendList").innerHTML = list;
}

// INPUT LISTENERS
document.getElementById("income").addEventListener("input", e=>{
  state.income = Number(e.target.value);
  save(); render();
});

document.getElementById("bills").addEventListener("input", e=>{
  state.bills = Number(e.target.value);
  save(); render();
});

// INIT
load();
</script>

</body>
</html>
